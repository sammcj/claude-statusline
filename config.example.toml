# claude-statusline configuration
# Place this file at ~/.config/claude-statusline/config.toml

# Module order and separators (this is the default)
# format = "$directory | $git_branch | $model | $cost | $context"

# Active palette name
# palette = "default"

# Color palettes
# [palettes.default]
# accent = "cyan"
# cost_ok = "green"
# cost_warn = "yellow"
# cost_high = "red"
# ctx_ok = "green"
# ctx_warn = "yellow"
# ctx_high = "red"

# [model]
# format = "{{.DisplayName}}"
# style = "bold"

# [directory]
# format = "{{.Dir}}"
# style = "palette:accent"
# truncation_length = 3

# [cost]
# format = "${{printf \"%.2f\" .TotalCostUSD}}"
# style = "palette:cost_ok"
# thresholds = [
#   { above = 1.0, style = "palette:cost_warn" },
#   { above = 5.0, style = "palette:cost_high" },
# ]

# [context]
# format = "{{.Bar}} {{printf \"%.0f\" .UsedPct}}%"
# style = "palette:ctx_ok"
# bar_width = 5
# bar_fill = "█"
# bar_empty = "░"
# thresholds = [
#   { above = 50, style = "palette:ctx_warn" },
#   { above = 70, style = "208" },
#   { above = 90, style = "palette:ctx_high" },
# ]
# Attention markers rendered on either side of the bar. The highest matching
# marker wins. Set to [] to disable.
# bar_markers = [
#   { above = 20, glyph = "▲", style = "208" }, # orange
#   { above = 30, glyph = "▲", style = "202" }, # orange-red
#   { above = 35, glyph = "▲", style = "red" },
# ]

# [git_branch]
# format = "\ue0a0 {{.Branch}}{{if .InWorktree}} \uf0e8{{end}}"
# style = "palette:accent"

# [session_timer]
# disabled = true
# format = "{{.Elapsed}}"
# style = "dim"

# [lines_changed]
# disabled = true
# format = "+{{.Added}} -{{.Removed}}"
# added_style = "green"
# removed_style = "red"

# Requires Claude Code 2.1.80+ which provides rate_limits in the status line payload.
# Add $usage to your format string to display it.
# [usage]
# disabled = false
# format = '{{.BlockBar}} {{printf "%.0f" .BlockPct}}% W:{{printf "%.0f" .WeeklyPct}}%'
# style = "green"
# bar_width = 5
# bar_fill = "█"
# bar_empty = "░"
# thresholds = [
#   { above = 75, style = "yellow" },
#   { above = 90, style = "red" },
# ]
#
# To only show usage when it exceeds a threshold:
# format = '{{if ge .BlockPct 70.0}}{{.BlockBar}} {{printf "%.0f" .BlockPct}}%{{end}}{{if ge .WeeklyPct 80.0}} W:{{printf "%.0f" .WeeklyPct}}%{{end}}'
